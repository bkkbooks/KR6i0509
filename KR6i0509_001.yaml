body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣施護等奉詔譯佛世尊一時在舍衛國祇樹給孤獨園與苾芻衆俱佛告諸苾芻言汝等諦聽若諸聲聞修習正行欲得清淨心者當斷五法修習七法而令圓滿何等五法一貪欲二瞋恚三昏沈睡眠四掉悔五疑此五蓋障應當除斷何等七法一擇法覺支二念覺支三精進覺支四喜覺支五輕安覺支六定覺支七捨覺支如是七法應當修習諸苾芻所言清淨心者當知即是心解脫增語慧解脫增語由貪染污心不清淨由無明染污慧不清淨若諸苾芻斷除貪染即得心解脫斷除無明即得慧解脫又諸苾芻離貪染污得心解脫者是名身作證斷除無明得慧解脫者是名無學永離貪愛了知真實正智現前取證自果盡苦邊際諸苾芻如是所說汝等應學
